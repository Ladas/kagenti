apiVersion: agent.kagenti.dev/v1alpha1
kind: Agent
metadata:
  labels:
    app.kubernetes.io/created-by: e2e-test
    app.kubernetes.io/name: kagenti-operator
    kagenti.io/framework: AutoGen
    kagenti.io/protocol: a2a
    kagenti.io/type: agent
  name: k8s-debug-agent
  namespace: kagenti-agents
  annotations:
    description: "Kubernetes debugging agent for diagnosing workload issues"
spec:
  description: "Agent that diagnoses Kubernetes workloads and provides remediation guidance"

  replicas: 1

  imageSource:
    buildRef:
      name: k8s-debug-agent-build

  podTemplateSpec:
    spec:
      containers:
      - name: agent
        env:
        # Service Configuration
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"

        # MCP Tool Configuration (k8s-readonly-server)
        - name: MCP_URL
          value: "http://mcp-k8s-readonly-server-proxy.kagenti-agents.svc.cluster.local:8080/mcp"
        - name: MCP_TRANSPORT
          value: "http"

        # OpenTelemetry Configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
        - name: OTEL_SERVICE_NAME
          value: "k8s-debug-agent"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"

        # Phoenix Project Assignment (using 'default' to share with team1 agents for now)
        - name: PHOENIX_PROJECT_NAME
          value: "default"

        # Kubernetes Metadata (via Downward API)
        - name: K8S_NAMESPACE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        # Deployment Environment
        - name: DEPLOYMENT_ENVIRONMENT
          value: "kind-local"

        # LLM Configuration (OpenAI API)
        - name: LLM_API_BASE
          value: "https://api.openai.com/v1"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key
              key: api-key
        - name: TASK_MODEL_ID
          value: "gpt-4o-mini"

        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

        volumeMounts:
        - mountPath: /app/.cache
          name: cache

      volumes:
      - name: cache
        emptyDir: {}
